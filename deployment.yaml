apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:        # This must be under spec -> template -> spec
      - name: java-app
        image: nithiss17/java-app:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: java-app-service
spec:
  selector:
    app: java-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080  # The port your Java app runs on
      nodePort: 30001   # Optional: Only if type is NodePort
  type: LoadBalancer    # Or NodePort
